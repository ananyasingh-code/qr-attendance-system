<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Login</h2>

<select id="role">
  <option value="student">Student</option>
  <option value="faculty">Faculty</option>
  <option value="coordinator">Coordinator</option>
</select>

<br><br>

<input id="username" placeholder="Roll No / Faculty Name"><br><br>
<input id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<script>
async function login() {

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  if (role === "student") {

    const res = await fetch("/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ roll: username, password })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem("student", JSON.stringify(data.student));
      window.location = "dashboard.html";
    } else {
      alert("Invalid student login");
    }

  } else if (role === "faculty") {

    localStorage.setItem("faculty", JSON.stringify({
      name: username
    }));

    window.location = "faculty.html";

  } else if (role === "coordinator") {

    if (username === "admin" && password === "admin123") {
      window.location = "coordinator.html";
    } else {
      alert("Invalid coordinator login");
    }

  }
}
</script>

</body>
</html>
